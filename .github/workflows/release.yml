name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "28.3"

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Install trunk
        run: |
          cargo install --locked cargo-binstall
          cargo binstall trunk --no-confirm

      - name: Build WASM UI
        working-directory: crates/devbridge-ui
        run: trunk build --release

      - name: Build service binary
        run: cargo build --release -p devbridge-service

      - name: Prepare sidecar with target-triple naming
        shell: pwsh
        run: |
          Copy-Item "target\release\devbridge-service.exe" `
            "target\release\devbridge-service-x86_64-pc-windows-msvc.exe"

      - name: Install tauri-cli
        run: cargo binstall tauri-cli --no-confirm

      - name: Build Tauri NSIS installer
        working-directory: crates/devbridge-app
        run: cargo tauri build

      - name: Compute checksums
        shell: pwsh
        run: |
          $installer = Get-ChildItem "crates\devbridge-app\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -Path $installer.FullName -Algorithm SHA256).Hash
          "$hash  $($installer.Name)" | Out-File -FilePath SHA256SUMS -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            crates/devbridge-app/target/release/bundle/nsis/*.exe
            SHA256SUMS
