name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  PROTOC_VERSION: "28.3"

jobs:
  # ── Stage 1: Format ─────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  # ── Stage 2: Lint ───────────────────────────────────────────────────
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Clippy (all targets, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Stage 3: Test ───────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Run all workspace tests
        run: cargo test --workspace --all-targets

      - name: Run doc tests
        run: cargo test --workspace --doc

  # ── Stage 4: Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Build workspace (release)
        run: cargo build --workspace --release

  # ── Stage 5: Security Audit ────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 6: Dependency License Check ──────────────────────────────
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

  # ── Final Gate ─────────────────────────────────────────────────────
  # This job is the single required status check for branch protection.
  # It only succeeds if ALL upstream jobs passed.
  ci-pass:
    name: CI Pass
    if: always()
    needs: [format, lint, test, build, audit, deny]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          echo "Format:  ${{ needs.format.result }}"
          echo "Lint:    ${{ needs.lint.result }}"
          echo "Test:    ${{ needs.test.result }}"
          echo "Build:   ${{ needs.build.result }}"
          echo "Audit:   ${{ needs.audit.result }}"
          echo "Deny:    ${{ needs.deny.result }}"

          if [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.deny.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI checks passed"
