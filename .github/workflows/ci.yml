name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  PROTOC_VERSION: "28.3"

jobs:
  # ── Stage 1: Format ─────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  # ── Stage 2: Lint ───────────────────────────────────────────────────
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Clippy (all targets, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Stage 3: Test ───────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Run all workspace tests
        run: cargo test --workspace --all-targets

      - name: Run doc tests
        run: cargo test --workspace --doc

  # ── Stage 4: Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Build workspace (release)
        run: cargo build --workspace --release

  # ── Stage 5: Security Audit ────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cargo-audit --no-confirm

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2026-0049

  # ── Stage 6: Dependency License Check ──────────────────────────────
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

  # ── TDD Enforcement ─────────────────────────────────────────────────
  tdd-enforce:
    name: TDD Policy
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - name: No ignored tests
        run: |
          if grep -rn '#\[ignore' crates/ tests/ 2>/dev/null; then
            echo "::error::Found #[ignore] — all tests must run"
            exit 1
          fi

      - name: No empty test bodies
        run: |
          # Check for test functions with empty bodies (opening and closing brace on same or next line with only whitespace)
          python3 -c "
          import re, sys, pathlib
          pattern = re.compile(r'#\[test\].*?\n\s*(?:async\s+)?fn\s+\w+\([^)]*\)[^{]*\{\s*\}', re.DOTALL)
          found = False
          for p in list(pathlib.Path('crates').rglob('*.rs')) + list(pathlib.Path('tests').rglob('*.rs')):
              text = p.read_text()
              for m in pattern.finditer(text):
                  print(f'::error file={p}::{m.group().strip()[:80]}')
                  found = True
          if found:
              print('::error::Found empty test body')
              sys.exit(1)
          "

      - name: No todo in production code
        run: |
          # Check for todo!() in non-test Rust code within crates/
          FOUND=$(grep -rn 'todo!()' crates/ --include='*.rs' | grep -v '#\[cfg(test)\]' | grep -v 'mod tests' | grep -v '#\[test\]' || true)
          if [ -n "$FOUND" ]; then
            # Filter out lines that are inside test modules
            REAL_FOUND=""
            while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINENUM=$(echo "$line" | cut -d: -f2)
              # Check if this line is inside a #[cfg(test)] module
              if ! head -n "$LINENUM" "$FILE" | grep -q '#\[cfg(test)\]'; then
                REAL_FOUND="$REAL_FOUND
          $line"
              fi
            done <<< "$FOUND"
            if [ -n "$REAL_FOUND" ]; then
              echo "$REAL_FOUND"
              echo "::error::Found todo!() in production code"
              exit 1
            fi
          fi

  # ── Tier 1 Gate ──────────────────────────────────────────────────────
  tier1-pass:
    name: Tier 1 Pass
    if: always()
    needs: [format, lint, test, build, audit, deny, tdd-enforce]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all Tier 1 jobs passed
        run: |
          echo "Format:      ${{ needs.format.result }}"
          echo "Lint:        ${{ needs.lint.result }}"
          echo "Test:        ${{ needs.test.result }}"
          echo "Build:       ${{ needs.build.result }}"
          echo "Audit:       ${{ needs.audit.result }}"
          echo "Deny:        ${{ needs.deny.result }}"
          echo "TDD Enforce: ${{ needs.tdd-enforce.result }}"

          if [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.deny.result }}" != "success" ]] || \
             [[ "${{ needs.tdd-enforce.result }}" != "success" ]]; then
            echo "::error::One or more Tier 1 jobs failed"
            exit 1
          fi

          echo "All Tier 1 checks passed"

  # ── Windows Build: NSIS Installer + E2E Binary ─────────────────────
  windows-build:
    name: Windows Build
    runs-on: windows-latest
    needs: tier1-pass
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Build service binary
        run: cargo build --release -p devbridge-service

      - name: Prepare sidecar with target-triple naming
        shell: pwsh
        run: |
          Copy-Item "target\release\devbridge-service.exe" `
            "target\release\devbridge-service-x86_64-pc-windows-msvc.exe"

      - name: Build E2E test binary
        run: cargo build --manifest-path crates/devbridge-e2e/Cargo.toml --release

      - name: Install trunk
        shell: pwsh
        run: |
          cargo install --locked cargo-binstall
          cargo binstall trunk --no-confirm

      - name: Build WASM UI
        working-directory: crates/devbridge-ui
        run: trunk build --release

      - name: Install tauri-cli
        shell: pwsh
        run: cargo binstall tauri-cli --no-confirm

      - name: Build Tauri NSIS installer
        working-directory: crates/devbridge-app
        run: cargo tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: devbridge-installer
          path: crates/devbridge-app/target/release/bundle/nsis/*.exe
          retention-days: 1

      - name: Upload E2E binary
        uses: actions/upload-artifact@v4
        with:
          name: devbridge-e2e
          path: crates/devbridge-e2e/target/release/devbridge-e2e.exe
          retention-days: 1

  # ── Tier 2: Deploy Client ────────────────────────────────────────────
  e2e-deploy-client:
    name: E2E Deploy Client
    runs-on: [self-hosted, windows, x64, print-client]
    needs: windows-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: devbridge-installer
          path: artifacts/

      - name: Deploy client via NSIS installer + post-install
        shell: powershell
        env:
          E2E_TARGET_PRINTER: "Microsoft Print to PDF"
        run: |
          & { . .\deploy\e2e-setup-client-local.ps1 }

  # ── Tier 2: Deploy Server + E2E Test ─────────────────────────────────
  e2e-test:
    name: E2E Test
    runs-on: [self-hosted, windows, x64, print-server]
    needs: windows-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: devbridge-installer
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: devbridge-e2e
          path: artifacts/

      - name: Deploy and start server
        shell: powershell
        run: |
          & { . .\deploy\e2e-setup-server.ps1 }

      - name: Wait for services
        shell: powershell
        run: |
          & { . .\deploy\e2e-wait-ready.ps1 }

      - name: Run E2E tests
        shell: powershell
        env:
          E2E_SERVER_HOST: localhost
          E2E_CLIENT_HOST: print-client.lan
          E2E_TARGET_PRINTER: "Microsoft Print to PDF"
        run: |
          .\artifacts\devbridge-e2e.exe

      - name: Dump server logs
        if: always()
        shell: powershell
        run: |
          $logDir = "C:\ProgramData\DevBridge\logs"
          if (Test-Path $logDir) {
            Get-ChildItem $logDir -Filter "*.log" | ForEach-Object { Write-Host "--- $($_.Name) ---"; Get-Content $_.FullName -Tail 50 }
          } else {
            Write-Host "No log directory found at $logDir"
          }

  # ── Final Gate ─────────────────────────────────────────────────────
  all-pass:
    name: All Pass
    if: always()
    needs: [tier1-pass, e2e-test, e2e-deploy-client]
    runs-on: ubuntu-latest
    steps:
      - name: Check all tiers passed
        run: |
          echo "Tier 1:          ${{ needs.tier1-pass.result }}"
          echo "E2E Test:        ${{ needs.e2e-test.result }}"
          echo "E2E Client:      ${{ needs.e2e-deploy-client.result }}"

          if [[ "${{ needs.tier1-pass.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-test.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-deploy-client.result }}" != "success" ]]; then
            echo "::error::CI or E2E tests failed"
            exit 1
          fi

          echo "All checks passed"
